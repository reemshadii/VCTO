<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Color Analysis</title>
    <style>
        :root {
            --primary: #6366f1;
            --card-bg: #1a202c;
            --text-main: #f7fafc;
            --text-secondary: #a0aec0;
        }
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: var(--text-main); margin: 0; padding: 20px; }
        .step-content { display: none; max-width: 600px; margin: 0 auto; }
        .step-content.active { display: block; }
        .btn { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #4a5568; color: white; }
        .color-palette { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .swatch { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff; }
        .analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .analysis-card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid #2d3748; }
        .analysis-card h4 { margin: 0 0 5px 0; font-size: 0.9rem; color: var(--text-secondary); }
        .analysis-card p { margin: 0; font-weight: bold; }
        #result-preview { width: 100%; border-radius: 8px; margin-bottom: 20px; border: 1px solid #2d3748; }
    </style>
</head>
<body>

    <div id="step-5" class="step-content active">
        <h2>Step 5: Analysis Complete</h2>
        <img id="result-preview" src="girl.jpeg" alt="Analyzing...">
        
        <div style="background: var(--card-bg); padding:1.5rem; border-radius:12px;">
            <div style="margin-bottom:15px; border-bottom:1px solid #2d3748; padding-bottom:10px;">
                <h3 style="color:var(--primary); margin-bottom: 5px;" id="season-result">Detecting...</h3>
                <p id="subseason-traits" style="color: var(--text-secondary); font-size: 0.9rem; margin: 0;"></p>
            </div>
            
            <h3 style="margin-bottom:10px; font-size: 1.1em;">Your Recommended Palette:</h3>
            <div class="color-palette" id="color-palette-display"></div>
        </div>
        
        <div class="analysis-grid" id="analysis-cards-container">
            </div>

        <div id="full-description" style="margin-top:20px; line-height:1.6; color: var(--text-secondary);"></div>

        <br>
        <button class="btn btn-secondary" onclick="alert('Going Back...')">← Retake</button>
        <button class="btn btn-primary" onclick="alert('Saving results...')">Save Profile →</button>
    </div>

<script>
    const colorLogic = {
        "Deep Winter": {
            subseason: "Deep", season: "Winter", undertone: "Cool", contrast: "High",
            characteristics: "Dark, Cool & Clear",
            palette: ["#1D1D1B", "#FFFFFF", "#4A0E0E", "#002366", "#C0C0C0"],
            bestMetals: "Silver, Platinum", avoid: "Earth tones, Mustard",
            description: "Your primary trait is Depth. You need high-contrast jewel tones and stark black-and-white combinations."
        },
        "True Winter": {
            subseason: "True", season: "Winter", undertone: "Strictly Cool", contrast: "Very High",
            characteristics: "Vivid, Chilly & Clear",
            palette: ["#000000", "#F5F5F5", "#D70270", "#0000FF", "#008080"],
            bestMetals: "High-shine Silver", avoid: "Orange, Gold",
            description: "Your primary trait is Coolness. You are the 'icy' winter. Pure, blue-based primary colors look best."
        },
        "Deep Autumn": {
            subseason: "Deep", season: "Autumn", undertone: "Neutral-Warm", contrast: "High",
            characteristics: "Dark, Rich & Earthy",
            palette: ["#3D2B1F", "#F5F5DC", "#800000", "#556B2F", "#DAA520"],
            bestMetals: "Antique Gold, Bronze", avoid: "Icy Pastels, Cool Blues",
            description: "Your primary trait is Depth. Rich, heavy, and saturated earthy colors make your features pop."
        }
        // ... include other seasons here
    };

    function runAnalysis() {
        // Strict Analysis Logic: 
        // Based on the provided image (dark hair, cool skin, high contrast)
        // We will simulate the detection of "Deep Winter"
        const detectedSubseason = "Deep Winter"; 
        const data = colorLogic[detectedSubseason];

        // 1. Update Headers (Subseason + Season)
        document.getElementById('season-result').innerText = `${data.subseason} ${data.season}`;
        document.getElementById('subseason-traits').innerText = data.characteristics;

        // 2. Generate Palette Swatches
        const paletteContainer = document.getElementById('color-palette-display');
        paletteContainer.innerHTML = data.palette.map(color => 
            `<div class="swatch" style="background: ${color}"></div>`
        ).join('');

        // 3. Generate Extensive Analysis Cards
        const cardsContainer = document.getElementById('analysis-cards-container');
        cardsContainer.innerHTML = `
            <div class="analysis-card"><h4>Undertone</h4><p>${data.undertone}</p></div>
            <div class="analysis-card"><h4>Contrast</h4><p>${data.contrast}</p></div>
            <div class="analysis-card"><h4>Best Metals</h4><p>${data.bestMetals}</p></div>
            <div class="analysis-card"><h4>Avoid</h4><p>${data.avoid}</p></div>
        `;

        // 4. Update Detailed Text
        document.getElementById('full-description').innerHTML = `
            <strong style="color:white">Why ${detectedSubseason}?</strong><br>
            ${data.description}
        `;
    }

    // Run on load
    window.onload = runAnalysis;
</script>

</body>
</html>
